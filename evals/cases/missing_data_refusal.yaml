cases:
- id: unsupported_region_refusal
  kind: regression
  source: product_requirement
  rail: output
  turns:
  - role: user
    content: Cheapest 4 vCPU 8 GB VM on Fly in antarctica?
  gates:
    max_latency_ms: 1000.0
    max_tool_calls: 1
    max_input_tokens: 500
    max_output_tokens: 1000
  tool_call:
    name: compare
    args:
      vcpu: 4
      ram_gb: 8
      region: antarctica
      family: any
      providers:
      - fly
      expand: cheapest
  tool_result:
    request:
      vcpu: 4
      ram_gb: 8
      region: antarctica
      family: any
      providers:
      - fly
    results: []
    ranked_by: monthly_usd
    unmet_requirements:
    - provider: fly
      reason: provider_not_supported
    - region: antarctica
      reason: region_not_mapped
  final_answer: |
    I do not have covered pricing data for fly and antarctica, so I cannot quote a verified price for that request.
  answer_plan:
    answer_type: missing_data
    unmet_requirements:
    - provider: fly
      reason: provider_not_supported
    - region: antarctica
      reason: region_not_mapped
  checks:
  - tool_call
  - missing_data_refusal
  expect:
    missing_data: true
