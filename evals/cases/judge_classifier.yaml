    max_input_tokens: 500
    max_output_tokens: 1000
  guardrail_decision:
    action: allow
    rail: input
    reason: safe
    confidence: 0.93
    public_message: null
  final_answer: |
    This request is safe for the main pricing model.
  checks:
  - rail_metadata_present
  - input_guardrail_decision
  - judge_allows_safe
  expect:
    guardrail_decision:
      action: allow
      reason: safe
