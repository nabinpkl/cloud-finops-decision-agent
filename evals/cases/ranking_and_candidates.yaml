cases:
- id: cheapest_4vcpu_8gb_eu
  kind: regression
  source: product_requirement
  rail: output
  turns:
  - role: user
    content: Cheapest 4 vCPU 8 GB general-purpose VM across the big 3 in EU?
  trial_count: 2
  gates:
    max_latency_ms: 1000.0
    max_tool_calls: 1
    max_input_tokens: 500
    max_output_tokens: 1000
  tool_call:
    name: compare
    args:
      vcpu: 4
      ram_gb: 8
      region: eu-central
      family: general-purpose
      providers:
      - aws
      - gcp
      - azure
      expand: cheapest
  tool_result:
    request:
      vcpu: 4
      ram_gb: 8
      region: eu-central
      family: general-purpose
      providers:
      - aws
      - gcp
      - azure
    results:
    - provider: aws
      instance_type: m5.xlarge
      region_native: eu-central-1
      monthly_usd: 140.16
      hourly_usd: 0.192
      citation:
        source_url: https://aws.example/prices
        json_path: $.aws.m5
        fetched_at: '2026-06-05T10:00:00Z'
        age_hours: 6.0
        snapshot:
          provider: aws
          snapshot_iso: 2026-06-05T10-00-00Z
          filename: eu-central-1.json
    - provider: gcp
      instance_type: n2-standard-4
      region_native: europe-west3
      monthly_usd: 148.92
      hourly_usd: 0.204
      citation:
        source_url: https://gcp.example/skus
        json_path: $.gcp.n2
        fetched_at: '2026-06-05T09:00:00Z'
        age_hours: 7.0
        snapshot:
          provider: gcp
          snapshot_iso: 2026-06-05T09-00-00Z
          filename: skus.json
    - provider: azure
      instance_type: Standard_D4s_v5
      region_native: westeurope
      monthly_usd: 154.2
      hourly_usd: 0.2112
      citation:
        source_url: https://azure.example/prices
        json_path: $.azure.d4
        fetched_at: '2026-06-05T08:30:00Z'
        age_hours: 7.5
        snapshot:
          provider: azure
          snapshot_iso: 2026-06-05T08-30-00Z
          filename: westeurope.json
    ranked_by: monthly_usd
    unmet_requirements: []
  final_answer: |
    Cheapest is AWS m5.xlarge at $140.16/mo in eu-central-1 (snapshot 6h old). Candidates considered: AWS considered m5.xlarge at $140.16/mo (snapshot 6h old), GCP considered n2-standard-4 at $148.92/mo (snapshot 7h old), and Azure considered Standard_D4s_v5 at $154.20/mo (snapshot 7.5h old).
  answer_plan:
    answer_type: ranking
    price_claims:
    - provider: aws
      instance_type: m5.xlarge
      region_native: eu-central-1
      monthly_usd: 140.16
      hourly_usd: 0.192
      snapshot_age_hours: 6.0
      source_result_index: 0
      citation:
        source_url: https://aws.example/prices
        json_path: $.aws.m5
        snapshot:
          provider: aws
          snapshot_iso: 2026-06-05T10-00-00Z
          filename: eu-central-1.json
    - provider: gcp
      instance_type: n2-standard-4
      region_native: europe-west3
      monthly_usd: 148.92
      hourly_usd: 0.204
      snapshot_age_hours: 7.0
      source_result_index: 1
      citation:
        source_url: https://gcp.example/skus
        json_path: $.gcp.n2
        snapshot:
          provider: gcp
          snapshot_iso: 2026-06-05T09-00-00Z
          filename: skus.json
    - provider: azure
      instance_type: Standard_D4s_v5
      region_native: westeurope
      monthly_usd: 154.2
      hourly_usd: 0.2112
      snapshot_age_hours: 7.5
      source_result_index: 2
      citation:
        source_url: https://azure.example/prices
        json_path: $.azure.d4
        snapshot:
          provider: azure
          snapshot_iso: 2026-06-05T08-30-00Z
          filename: westeurope.json
    candidate_claims:
    - provider: aws
      instance_type: m5.xlarge
      monthly_usd: 140.16
      snapshot_age_hours: 6.0
      source_result_index: 0
    - provider: gcp
      instance_type: n2-standard-4
      monthly_usd: 148.92
      snapshot_age_hours: 7.0
      source_result_index: 1
    - provider: azure
      instance_type: Standard_D4s_v5
      monthly_usd: 154.2
      snapshot_age_hours: 7.5
      source_result_index: 2
  checks:
  - tool_call
  - price_provenance
  - snapshot_age
  - candidate_coverage
  expect:
    required_providers:
    - aws
    - gcp
    - azure
    required_candidates:
    - m5.xlarge
    - n2-standard-4
    - Standard_D4s_v5
