version: 1

main:
  model_env: MODEL_NAME
  provider_base_url_env: PROVIDER_BASE_URL
  provider_api_key_env: PROVIDER_API_KEY
  request:
    disable_streaming: true
    stream_usage: true
    use_responses_api: false
    max_tokens: 4000
    extra_body:
      provider:
        require_parameters: true
  structured_output:
    strategy: provider
    schema_name: AnswerPlan
    strict: true

judge:
  model_env: JUDGE_MODEL_NAME
  provider_base_url_env: JUDGE_PROVIDER_BASE_URL
  provider_api_key_env: JUDGE_PROVIDER_API_KEY
  fallback_provider_base_url_env: PROVIDER_BASE_URL
  fallback_provider_api_key_env: PROVIDER_API_KEY
  request:
    temperature: 0
    max_tokens: 300
    provider:
      require_parameters: true
    reasoning:
      effort: low
  structured_output:
    type: json_schema
    name: judge_decision
    schema_name: GuardDecision
    strict: true
    actions:
      - allow
      - block
